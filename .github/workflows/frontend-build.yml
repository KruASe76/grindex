name: Frontend build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build frontend artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_WS_URL: ${{ vars.VITE_WS_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate repository variables
        run: |
          if [[ -z "${VITE_API_URL}" ]]; then
            echo "::error title=Missing repository variable::VITE_API_URL is not configured"
            exit 1
          fi

          if [[ -z "${VITE_WS_URL}" ]]; then
            echo "::error title=Missing repository variable::VITE_WS_URL is not configured"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: grindex-frontend-${{ github.sha }}
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 30
