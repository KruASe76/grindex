name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.19"
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run --frozen ruff format --check .

      - name: Lint
        run: uv run --frozen ruff check .

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

  websocket-lint:
    name: WebSocket lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ws-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ws-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-only-secret-key-not-for-production
      WS_BACKEND_URL: http://localhost:8001
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: grindex
      POSTGRES_PASSWORD: grindex
      POSTGRES_DATABASE: grindex
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.19"
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Test
        run: uv run --frozen pytest

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Test
        run: npm test -- --run

  websocket-tests:
    name: WebSocket tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ws-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ws-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --runInBand

  frontend-e2e:
    name: Frontend end-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_WS_URL: http://localhost:8001
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Configure test stack
        run: |
          printf '%s\n' \
            'SECRET_KEY=ci-only-secret-key-not-for-production' \
            'POSTGRES_HOST=localhost' \
            'POSTGRES_PORT=5432' \
            'POSTGRES_USER=grindex' \
            'POSTGRES_PASSWORD=grindex' \
            'POSTGRES_DATABASE=grindex' \
            > .env

      - name: Start backend stack
        run: docker compose up -d

      - name: Wait for backend stack
        run: |
          timeout 180 bash -c 'until curl --fail --silent http://localhost:8000/health >/dev/null; do sleep 3; done'
          timeout 180 bash -c 'until curl --fail --silent http://localhost:8001 >/dev/null; do sleep 3; done'

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Capture backend logs
        if: failure()
        run: docker compose logs --no-color > compose.log || true

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
            compose.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop backend stack
        if: always()
        run: docker compose down --volumes --remove-orphans
